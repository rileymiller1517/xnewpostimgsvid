name: Post Mix (Images + Videos + Threads) to X
on:
  workflow_dispatch:
    inputs:
      post_count:
        description: "Total number of posts to publish this run (split across types below)"
        required: false
        default: "10"
      image_percent:
        description: "Percentage of posts that are images (0-100). 0 = no images this run."
        required: false
        default: "40"
      video_percent:
        description: "Percentage of posts that are videos (0-100). 0 = no videos this run."
        required: false
        default: "30"
      thread_percent:
        description: "Percentage of posts that are sheet threads (0-100). 0 = no threads this run."
        required: false
        default: "30"
      caption_source:
        description: "Caption source for IMAGE/VIDEO posts only (threads always use the sheet)"
        type: choice
        options:
          - csv
          - custom
        default: csv
      custom_caption:
        description: "Only used if caption_source=custom. Use \\n for line breaks."
        required: false
        default: ""
      links:
        description: "Optional comma-separated links — applied to image/video posts in order"
        required: false
        default: ""
      spreadsheet_id:
        description: "Google Sheet ID for thread captions"
        required: false
        default: "1QXCzLY_ygvJlCxdgDyh_oYkBxm5jSfDp56jtYQ1FVYw"
      sheet_tab_name:
        description: "Tab name inside the sheet"
        required: false
        default: "threads"
      caption_column:
        description: "Column letter holding caption/thread text"
        required: false
        default: "A"
      thread_delimiter:
        description: "Put this on its own line in a cell to split it into a multi-tweet thread"
        required: false
        default: "---"
      interval_minutes:
        description: "Minutes to wait between posts"
        required: false
        default: "10"
      shuffle:
        description: "Shuffle post order? (true/false)"
        required: false
        default: "true"
      source_folder_id:
        description: "Google Drive folder ID to pick images/videos FROM (overrides secret default)"
        required: false
        default: ""
      claimed_folder_id:
        description: "Google Drive folder ID to MOVE posted media INTO (overrides secret default)"
        required: false
        default: ""
jobs:
  post-mix:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install playwright gspread google-api-python-client google-auth google-auth-oauthlib google-auth-httplib2
          playwright install --with-deps chromium

      - name: Write X session state
        env:
          STATE_JSON: ${{ secrets.X_STORAGE_STATE_JSON }}
        run: printf '%s' "$STATE_JSON" > x_storage_state.json

      - name: Run mixed poster
        env:
          GDRIVE_CREDENTIALS_JSON:  ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
          SHEET_CREDENTIALS_JSON:   ${{ secrets.SHEET_CREDENTIALS_JSON }}
          GDRIVE_SOURCE_FOLDER_ID:  ${{ github.event.inputs.source_folder_id != '' && github.event.inputs.source_folder_id || secrets.GDRIVE_SOURCE_FOLDER_ID }}
          GDRIVE_CLAIMED_FOLDER_ID: ${{ github.event.inputs.claimed_folder_id != '' && github.event.inputs.claimed_folder_id || secrets.GDRIVE_CLAIMED_FOLDER_ID }}
          POST_COUNT:        ${{ github.event.inputs.post_count }}
          IMAGE_PERCENT:     ${{ github.event.inputs.image_percent }}
          VIDEO_PERCENT:     ${{ github.event.inputs.video_percent }}
          THREAD_PERCENT:    ${{ github.event.inputs.thread_percent }}
          CAPTION_SOURCE:    ${{ github.event.inputs.caption_source }}
          CUSTOM_CAPTION:    ${{ github.event.inputs.custom_caption }}
          LINKS:             ${{ github.event.inputs.links }}
          SPREADSHEET_ID:    ${{ github.event.inputs.spreadsheet_id }}
          SHEET_TAB_NAME:    ${{ github.event.inputs.sheet_tab_name }}
          CAPTION_COLUMN:    ${{ github.event.inputs.caption_column }}
          THREAD_DELIMITER:  ${{ github.event.inputs.thread_delimiter }}
          INTERVAL_MINUTES:  ${{ github.event.inputs.interval_minutes }}
          SHUFFLE_ORDER:     ${{ github.event.inputs.shuffle }}
          X_STORAGE_STATE_PATH: x_storage_state.json
          POSTS_CSV_PATH:    table.csv
        run: python post_mix_to_x.py

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-mix
          path: debug_screenshots/
          if-no-files-found: ignore
          retention-days: 7
